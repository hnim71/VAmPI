name: DevSecOps Pipeline
on: [push, pull_request]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 1. SAST - Semgrep (Phát hiện lỗi là dừng)
      - name: SAST Scan (Semgrep)
        run: |
          pip install semgrep
          semgrep scan --config "p/security-audit" --error

      # 2. SAST - SonarQube (Ép dừng ngay tại đây bằng Exit Code 3 nếu Quality Gate Failed)
      - name: SAST Scan (SonarQube)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=KEY_CUA_BAN
            -Dsonar.organization=ORG_CUA_BAN
            -Dsonar.qualitygate.wait=true

      # 3. SCA - Snyk (Phát hiện CVE High trở lên là dừng)
      - name: SCA Scan (Snyk)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          snyk auth $SNYK_TOKEN
          snyk test --file=requirements.txt --command=python3 --skip-unresolved --severity-threshold=high

      # 4. Khởi động ứng dụng (Mồi cho DAST)
      - name: Start App for DAST
        run: |
          nohup python app.py > app.log 2>&1 &
          sleep 10
          curl --silent --fail http://localhost:5000/ || exit 1

      # 5. DAST - OWASP ZAP (Quét thực tế, có lỗi là dừng)
      - name: DAST Scan (OWASP ZAP)
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: 'http://localhost:5000'
