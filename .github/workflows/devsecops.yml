name: DevSecOps Pipeline
on: [push, pull_request]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # SAST 1: Semgrep
      - name: SAST Scan (Semgrep)
        run: |
          pip install semgrep
          semgrep scan --config "p/security-audit" --json -o sast-report.json
        continue-on-error: true

      # SAST 2: SonarQube
      - name: SAST Scan (SonarQube)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=hnim71_VAmPI
            -Dsonar.organization=hnim71
            -Dsonar.sources=.

      # SCA: Snyk
      - name: SCA Scan (Snyk)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          snyk auth $SNYK_TOKEN
          snyk test --file=requirements.txt --severity-threshold=high
      # DAST: OWASP ZAP
      - name: DAST Scan (OWASP ZAP)
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: 'http://localhost:5000'
        continue-on-error: true

      # Quality Gate
      - name: Quality Gate
        run: |
          if [ -f sast-report.json ] && grep -q "ERROR" sast-report.json; then
            echo "::error::Lỗi High/Critical phát hiện!"
            exit 1
          fi
