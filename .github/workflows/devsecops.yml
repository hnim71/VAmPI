name: DevSecOps Pipeline
on: [push, pull_request]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 1. SAST - Semgrep
      - name: SAST Scan (Semgrep)
        run: |
          pip install semgrep
          semgrep scan --config "p/security-audit" --error

      # 2. SAST - SonarQube
      - name: SAST Scan (SonarQube)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          
      # 3. SCA - Snyk (ignore Werkzeug, PyJWT)
      - name: SCA Scan (Snyk)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          npm install -g snyk
          snyk auth $SNYK_TOKEN
          
          cat <<EOF > .snyk
          version: v1.25.0
          ignore:
            SNYK-PYTHON-WERKZEUG-6808933:
              - '*':
                  reason: 'Legacy VAmPI strict constraint Werkzeug < 2.3'
                  expires: '2026-12-31T00:00:00.000Z'
            SNYK-PYTHON-PYJWT-17053408:
              - '*':
                  reason: 'Unable to update pyjwt without breaking changes'
                  expires: '2026-12-31T00:00:00.000Z'
          EOF
          snyk test --file=requirements.txt --command=python3 --skip-unresolved --severity-threshold=high
          
      # 4. Start app for DAST
      - name: Start app
        run: |
          nohup python app.py > app.log 2>&1 &
          sleep 10
          curl --silent --fail http://localhost:5000/ || (echo "APP FAILED TO START. READING APP.LOG" && cat app.log && exit 1)

      # 5. DAST - OWASP ZAP
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: 'http://localhost:5000'
          docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
