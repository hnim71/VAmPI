name: DevSecOps Pipeline
on: [push, pull_request]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # SAST 1: Semgrep
      - name: SAST Scan (Semgrep)
        run: |
          pip install semgrep
          semgrep scan --config "p/security-audit" --json -o sast-report.json
        continue-on-error: true

      # SAST 2: SonarQube
      - name: SAST Scan (SonarQube)
        uses: SonarSource/sonarcloud-github-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=hnim71_VAmPI
            -Dsonar.organization=hnim71
            -Dsonar.sources=.

      # SCA: Snyk
      - name: SCA Scan (Snyk)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # 1. Bắt buộc cài lại thư viện ngay trong step này để Snyk nhận diện
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
          # 2. Cài đặt và cấu hình Snyk
          npm install -g snyk
          snyk auth $SNYK_TOKEN
          
          # 3. Chạy test với các cờ (flags) ép buộc bỏ qua lỗi môi trường
          snyk test --file=requirements.txt --command=python3 --skip-unresolved --severity-threshold=high
        continue-on-error: true
        
      # DAST: OWASP ZAP
      - name: DAST Scan (OWASP ZAP)
        uses: zaproxy/action-baseline@v0.7.0
        with:
          target: 'http://localhost:5000'
        continue-on-error: true

      # Quality Gate
      - name: Quality Gate
        run: |
          if [ -f sast-report.json ] && grep -q "ERROR" sast-report.json; then
            echo "::error::Lỗi High/Critical phát hiện!"
            exit 1
          fi
